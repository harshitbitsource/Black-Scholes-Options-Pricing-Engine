<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black-Scholes Pricing Engine</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.plot.ly/plotly-2.34.0.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <h1>Black-Scholes Option Pricing Engine</h1>
      <p>Compute option prices, Greeks, implied volatility, and view interactive plots.</p>
    </header>

    <section class="controls">
      <div class="form-card">
        <form id="pricing-form">
          <label for="option_type">Option type</label>
          <select id="option_type" name="option_type">
            <option value="call">Call</option>
            <option value="put">Put</option>
          </select>

          <label for="spot">Spot Price</label>
          <input id="spot" name="spot" type="number" step="0.01" value="100" required />

          <label for="strike">Strike Price</label>
          <input id="strike" name="strike" type="number" step="0.01" value="100" required />

          <label for="years">Time to Expiry (years)</label>
          <input id="years" name="years" type="number" step="0.01" value="0.5" required />

          <label for="volatility">Volatility (%)</label>
          <input id="volatility" name="volatility" type="number" step="0.01" value="20" required />

          <label for="rate">Risk-free Rate (%)</label>
          <input id="rate" name="rate" type="number" step="0.01" value="5" required />

          <label for="dividend_yield">Dividend Yield (%)</label>
          <input id="dividend_yield" name="dividend_yield" type="number" step="0.01" value="0" />

          <label for="market_price">Market Price (for implied vol)</label>
          <input id="market_price" name="market_price" type="number" step="0.01" value="10" />

          <button type="submit">Calculate</button>
        </form>
      </div>

      <div class="results-card">
        <h2>Results</h2>
        <dl>
          <div>
            <dt>Price</dt>
            <dd id="result-price">-</dd>
          </div>
          <div>
            <dt>Delta</dt>
            <dd id="result-delta">-</dd>
          </div>
          <div>
            <dt>Gamma</dt>
            <dd id="result-gamma">-</dd>
          </div>
          <div>
            <dt>Vega</dt>
            <dd id="result-vega">-</dd>
          </div>
          <div>
            <dt>Theta</dt>
            <dd id="result-theta">-</dd>
          </div>
          <div>
            <dt>Rho</dt>
            <dd id="result-rho">-</dd>
          </div>
          <div>
            <dt>Implied Volatility</dt>
            <dd id="result-implied-vol">-</dd>
          </div>
        </dl>
      </div>
    </section>

    <section class="chart-card">
      <h2>Interactive Greek Charts</h2>
      <div id="chart"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
